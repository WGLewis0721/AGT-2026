<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed — A Gentlemen's Touch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Bebas+Neue&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 24px;
      letter-spacing: 4px;
      color: #C9A84C;
      margin-bottom: 48px;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-top: 3px solid #C9A84C;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .checkmark {
      font-size: 48px;
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 400;
      margin-bottom: 12px;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: #C9A84C;
      font-size: 18px;
      margin-bottom: 24px;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      font-weight: 300;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 1px solid #222;
      margin: 32px 0;
    }

    .summary-card {
      background: #0d0d0d;
      border: 1px solid #1e1e1e;
      padding: 20px 24px;
      text-align: left;
      margin-bottom: 32px;
      font-size: 13px;
      color: #888;
      line-height: 2;
    }

    .summary-card span {
      color: #f5f5f5;
    }

    .btn-ghost {
      display: inline-block;
      background: transparent;
      color: #666;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      padding: 12px 24px;
      border: 1px solid #333;
      cursor: pointer;
      text-decoration: none;
      width: 100%;
    }

    .note {
      margin-top: 32px;
      font-size: 12px;
      color: #555;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <div class="logo">A Gentlemen's Touch</div>

  <div class="card">
    <div class="checkmark">✦</div>
    <h1>Booking Confirmed</h1>
    <p class="tagline">Your detail is locked in.</p>

    <p class="subtitle" id="appt-line">Your appointment is confirmed.</p>

    <hr class="divider">

    <div class="summary-card" id="summary-card" style="display:none"></div>

    <a href="index.html" class="btn-ghost">Back to Home</a>

    <p class="note">
      You'll receive a text confirmation shortly with your booking details.
      Your detailer will collect the remaining balance on-site when the job is complete.
    </p>
  </div>

  <script>
    const PACKAGES = {
      sm_detail: 'Essential Detail',
      md_detail: 'Signature Detail',
      lg_detail: 'Executive Detail',
    };

    const date    = sessionStorage.getItem('agt_appointment_date') || '';
    const time    = sessionStorage.getItem('agt_appointment_time') || '';
    const pkg     = sessionStorage.getItem('agt_package') || '';
    const deposit = sessionStorage.getItem('agt_deposit') || '';

    if (date && time) {
      document.getElementById('appt-line').textContent =
        `Your appointment is confirmed for ${date} at ${time}.`;
    }

    const pkgDisplay = PACKAGES[pkg] || pkg;
    const lines = [];
    if (pkgDisplay) lines.push(`Package: <span>${pkgDisplay}</span>`);
    if (deposit)    lines.push(`Deposit Paid: <span>$${deposit}</span>`);

    if (lines.length) {
      const card = document.getElementById('summary-card');
      card.innerHTML = lines.join('<br>');
      card.style.display = 'block';
    }
  </script>

</body>
</html>
